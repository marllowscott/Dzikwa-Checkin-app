<!DOCTYPE html>
<html>
<head>
    <title>Create Super Admin</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
        .status { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        button { background: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin: 5px; }
        button:hover { background: #0056b3; }
        input { padding: 8px; margin: 5px; border: 1px solid #ddd; border-radius: 3px; width: 200px; }
    </style>
</head>
<body>
    <h1>🔐 Super Admin Setup</h1>
    <p>This will create the Super Admin account for the Dzikwa Check-in System.</p>
    
    <div>
        <button onclick="createSuperAdmin()">Create Super Admin</button>
        <button onclick="checkExisting()">Check Existing Admins</button>
    </div>
    
    <div id="status"></div>
    
    <script>
        const supabaseUrl = 'https://qdighwfpcnhhcnerzzvy.supabase.co';
        const serviceRoleKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkaWdod2ZwY25oaGNuZXJ6enV5Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc2OTY3OTM2MiwiZXhwIjoyMDg1MjU1MzYyfQ.gr4FoHP_a6BN3fEKVosvtZvi7YA1WM1LdtTeBh4vhOo';
        
        async function createSuperAdmin() {
            const status = document.getElementById('status');
            status.innerHTML = '<div class="status">Creating Super Admin...</div>';
            
            try {
                const response = await fetch(`${supabaseUrl}/rest/v1/admin_users`, {
                    method: 'POST',
                    headers: {
                        'apikey': serviceRoleKey,
                        'Authorization': `Bearer ${serviceRoleKey}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify({
                        email: 'superadmin@gmail.com',
                        password: 'admin123',
                        role: 'superadmin'
                    })
                });
                
                if (response.ok) {
                    status.innerHTML = '<div class="status success">✅ Super Admin created successfully!<br>Email: superadmin@gmail.com<br>Password: admin123<br>Role: superadmin</div>';
                } else {
                    const error = await response.json();
                    if (error.message?.includes('duplicate')) {
                        status.innerHTML = '<div class="status success">✅ Super Admin already exists!</div>';
                    } else {
                        status.innerHTML = `<div class="status error">❌ Error: ${error.message || 'Unknown error'}</div>`;
                    }
                }
            } catch (error) {
                status.innerHTML = `<div class="status error">❌ Error: ${error.message}</div>`;
            }
        }
        
        async function checkExisting() {
            const status = document.getElementById('status');
            status.innerHTML = '<div class="status">Checking existing admins...</div>';
            
            try {
                const response = await fetch(`${supabaseUrl}/rest/v1/admin_users?select=*&order=created_at.desc`, {
                    headers: {
                        'apikey': serviceRoleKey,
                        'Authorization': `Bearer ${serviceRoleKey}`
                    }
                });
                
                if (response.ok) {
                    const admins = await response.json();
                    let html = '<div class="status success"><h3>Existing Admins:</h3>';
                    admins.forEach(admin => {
                        const crown = admin.role === 'superadmin' ? '👑' : '👤';
                        html += `${crown} ${admin.email} (${admin.role})<br>`;
                    });
                    html += '</div>';
                    status.innerHTML = html;
                } else {
                    status.innerHTML = '<div class="status error">❌ Failed to check admins</div>';
                }
            } catch (error) {
                status.innerHTML = `<div class="status error">❌ Error: ${error.message}</div>`;
            }
        }
    </script>
</body>
</html>
