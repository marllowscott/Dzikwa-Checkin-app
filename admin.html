<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;margin:40px}
    .container{max-width:420px;margin:0 auto}
    .hidden{display:none}
    .message{margin-top:10px;padding:8px;border-radius:4px}
    .message.error{background:#f8d7da;color:#721c24}
    .message.success{background:#d4edda;color:#155724}
  </style>
</head>
<body>
<div class="container">
  <h2 id="formTitle">Admin Login</h2>

  <form id="loginForm">
    <label>Email</label><br>
    <input id="loginEmail" type="email" required><br><br>
    <label>Password</label><br>
    <input id="loginPassword" type="password" required><br><br>
    <button type="submit">Login</button>
  </form>

  <form id="createForm" class="hidden">
    <label>Full name</label><br>
    <input id="createName" type="text" required><br><br>
    <label>Email</label><br>
    <input id="createEmail" type="email" required><br><br>
    <label>Password</label><br>
    <input id="createPassword" type="password" required><br><br>
    <label>Confirm Password</label><br>
    <input id="createConfirmPassword" type="password" required><br><br>
    <button type="submit">Create Admin</button>
  </form>

  <div style="margin-top:12px">
    <a id="toggleLink" href="#" onclick="toggleForms();return false;">Don't have an account? Create Admin Account</a>
  </div>

  <div id="msg" class="message hidden"></div>
</div>

<script>
async function showMsg(text,type){const el=document.getElementById('msg');el.textContent=text;el.className='message '+(type||'');el.classList.remove('hidden')}
function clearMsg(){const el=document.getElementById('msg');el.textContent='';el.className='message hidden'}

function toggleForms(){
  clearMsg();
  const login=document.getElementById('loginForm'), create=document.getElementById('createForm'), title=document.getElementById('formTitle'), link=document.getElementById('toggleLink');
  if(login.classList.contains('hidden')){
    login.classList.remove('hidden'); create.classList.add('hidden'); title.textContent='Admin Login'; link.textContent="Don't have an account? Create Admin Account";
  } else {
    login.classList.add('hidden'); create.classList.remove('hidden'); title.textContent='Create Admin Account'; link.textContent='Back to login';
  }
}

document.getElementById('loginForm').addEventListener('submit', async e=>{
  e.preventDefault(); clearMsg();
  const email=document.getElementById('loginEmail').value, password=document.getElementById('loginPassword').value;
  try{
    const res=await fetch('/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
    const data=await res.json();
    if(!res.ok) return showMsg(data.message||'Login failed','error');
    localStorage.setItem('adminToken',data.token);
    showMsg('Login successful','success');
    window.location.href='/';
  }catch(err){showMsg('Network error','error')}
});

document.getElementById('createForm').addEventListener('submit', async e=>{
  e.preventDefault(); clearMsg();
  const name=document.getElementById('createName').value, email=document.getElementById('createEmail').value;
  const password=document.getElementById('createPassword').value, confirmPassword=document.getElementById('createConfirmPassword').value;
  if(password!==confirmPassword) return showMsg('Passwords do not match','error');
  if(password.length<6) return showMsg('Password must be at least 6 characters','error');

  try{
    // check if first-admin allowed
    const check=await fetch('/api/admin/setup-required');
    const setup=await check.json();
    const headers={'Content-Type':'application/json'};
    if(!setup.setupRequired){
      const token=localStorage.getItem('adminToken');
      if(!token) return showMsg('You must be logged in as admin to create new admins','error');
      headers['Authorization']='Bearer '+token;
    }

    const res=await fetch('/api/admin/create',{method:'POST',headers,body:JSON.stringify({name,email,password})});
    const data=await res.json();
    if(!res.ok) return showMsg(data.message||'Failed to create admin','error');
    showMsg('Admin created successfully','success');
    document.getElementById('createForm').reset();
    setTimeout(()=>{toggleForms()},1200);
  }catch(err){showMsg('Network error','error')}
});
</script>
</body>
</html>
